name: stack-llm

networks:
  my-network-public:
    name: my-network-public
    external: true

configs:
  qdrant_config:
    content: |
      log_level: INFO

services:
  ollama:
    image: ollama/ollama:0.9.2
    restart: always
    networks:
      - my-network-public
    expose:
      - 11434
    ports:
      - 11434:11434
    volumes:
      - /mnt-links/docker/ollama/root/.ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: always
    networks:
      - my-network-public
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - /mnt-links/docker/qdrant/qdrant/storage:/qdrant/storage
    labels:
      virtual.title: qdrant
      virtual.url: http://qdrant.dev.${USER_HOSTNAME:?error}/dashboard
      virtual.caddyfile: |
        https://qdrant.dev.${USER_HOSTNAME:?error} {
            redir http://qdrant.dev.${USER_HOSTNAME:?error}
        }
        http://qdrant.dev.${USER_HOSTNAME:?error} {
            reverse_proxy qdrant:6333 {
            }
        }

  openwebui:
    image: ghcr.io/open-webui/open-webui:0.6.15
    restart: always    
    networks:
      - my-network-public
    expose:
      - 8080
    volumes:
      - /mnt-links/docker/open-webui/app/backend/data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    labels:
      virtual.title: Open Web UI
      virtual.url: http://openwebui.${USER_HOSTNAME:?error}
      virtual.caddyfile: |
        https://openwebui.${USER_HOSTNAME:?error} {
            redir http://openwebui.${USER_HOSTNAME:?error}
        }
        http://openwebui.${USER_HOSTNAME:?error} {
            reverse_proxy openwebui:8080 {
            }
        }
